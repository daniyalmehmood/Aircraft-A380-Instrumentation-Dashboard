version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: aircraft_mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aircraft_instrumentation_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    image: daniyalazeemi/a380-sim:latest
    container_name: aircraft_app
    ports:
      - "3000:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/aircraft_instrumentation_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
